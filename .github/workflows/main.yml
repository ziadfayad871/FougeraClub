name: Build, publish and deploy to MonsterASP.NET
on: [push]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Install dependencies
        run: dotnet restore FougeraClub.sln
        
      - name: Build
        run: dotnet build FougeraClub.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish FougeraClub/FougeraClub.csproj --configuration Release --output ./publish --runtime win-x86
        
      - name: Test with .NET
        run: dotnet test FougeraClub.sln --configuration Release --no-build

      - name: Deploy to MonsterASP.NET via msdeploy
        shell: pwsh
        env:
          WEBSITE_NAME: ${{ secrets.WEBSITE_NAME }}
          SERVER_COMPUTER_NAME: ${{ secrets.SERVER_COMPUTER_NAME }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $sourcePath = (Resolve-Path "./publish").Path
          $serverComputerName = $env:SERVER_COMPUTER_NAME.TrimEnd('/')

          if ($serverComputerName -match '/msdeploy\.axd(\?.*)?$') {
            $destUrl = $serverComputerName
          }
          else {
            $destUrl = "$serverComputerName/msdeploy.axd?site=$($env:WEBSITE_NAME)"
          }

          & $msdeploy `
            -verb:sync `
            "-source:contentPath=$sourcePath" `
            "-dest:contentPath=$($env:WEBSITE_NAME),computerName=$destUrl,userName=$($env:SERVER_USERNAME),password=$($env:SERVER_PASSWORD),authType=Basic,includeAcls=False" `
            -allowUntrusted `
            -disableLink:AppPoolExtension `
            -disableLink:ContentExtension `
            -disableLink:CertificateExtension `
            -verbose
